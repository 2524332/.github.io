    function App() {
      const [hasStarted, setHasStarted] = useState(false);
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [showResult, setShowResult] = useState(false);

      const startGame = () => {
        setHasStarted(true);
        setCurrentQuestionIndex(0);
        setScore(0);
        setShowResult(false);
        resetTurn();
      };

      const resetTurn = () => {
        setSelectedOption(null);
        setIsAnswered(false);
      };

      const handleOptionClick = (index) => {
        if (isAnswered) return;
        
        setSelectedOption(index);
        setIsAnswered(true);
        
        if (index === questions[currentQuestionIndex].correctIndex) {
          setScore(score + 1);
        }
      };

      const handleNext = () => {
        if (currentQuestionIndex < questions.length - 1) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
          resetTurn();
        } else {
          setShowResult(true);
        }
      };

      if (!hasStarted) {
        return (
          <div className="min-h-screen bg-stone-100 flex items-center justify-center p-4 font-serif text-stone-800">
            <div className="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-stone-200">
              <div className="bg-emerald-800 p-8 text-center">
                <BookOpen className="w-16 h-16 text-emerald-100 mx-auto mb-4" />
                <h1 className="text-3xl font-bold text-white mb-2 tracking-widest">和歌の修辞法マスター</h1>
                <p className="text-emerald-100 text-sm">〜高校古文 基礎力養成〜</p>
              </div>
              <div className="p-8 text-center space-y-6">
                <p className="text-lg leading-relaxed">
                  古文のテストでよく出る「枕詞」「掛詞」「序詞」など、和歌の修辞法を学ぶ全30問のクイズアプリです。
                </p>
                <div className="bg-stone-50 p-4 rounded-lg text-left text-sm text-stone-600 border border-stone-100">
                  <ul className="list-disc list-inside space-y-2">
                    <li>対象：高校1年生（古文基礎）</li>
                    <li>出題形式：4択問題</li>
                    <li>問題数：全30問（解説付き）</li>
                  </ul>
                </div>
                <button 
                  onClick={startGame}
                  className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-4 rounded-xl transition-colors duration-300 text-lg shadow-md hover:shadow-lg flex items-center justify-center gap-2"
                >
                  学習をスタートする <ChevronRight className="w-5 h-5" />
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (showResult) {
        let message = "";
        if (score === 30) message = "完璧です！和歌の修辞法は完全にマスターしましたね！";
        else if (score >= 20) message = "素晴らしい成績です！定期テストもバッチリですね。";
        else if (score >= 10) message = "基礎が身についてきました。間違えたところを復習しましょう！";
        else message = "和歌の世界はこれから！解説を読んで少しずつ覚えましょう。";

        return (
          <div className="min-h-screen bg-stone-100 flex items-center justify-center p-4 font-serif text-stone-800">
            <div className="max-w-xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-stone-200 text-center">
              <div className="bg-emerald-800 p-8 text-white">
                <Trophy className="w-20 h-20 text-yellow-300 mx-auto mb-4" />
                <h2 className="text-3xl font-bold mb-2">学習完了！</h2>
              </div>
              <div className="p-8 space-y-8">
                <div>
                  <p className="text-stone-500 mb-2">あなたの正答数</p>
                  <div className="text-5xl font-bold text-emerald-700">
                    {score} <span className="text-2xl text-stone-400">/ 30</span>
                  </div>
                </div>
                <p className="text-lg text-stone-700 leading-relaxed bg-stone-50 p-4 rounded-lg">
                  {message}
                </p>
                <button 
                  onClick={startGame}
                  className="bg-stone-800 hover:bg-stone-900 text-white font-bold py-3 px-8 rounded-xl transition-colors duration-300 inline-flex items-center gap-2"
                >
                  <RotateCcw className="w-5 h-5" /> もう一度挑戦する
                </button>
              </div>
            </div>
          </div>
        );
      }

      const currentQuestion = questions[currentQuestionIndex];
      const progressPercentage = ((currentQuestionIndex) / questions.length) * 100;

      return (
        <div className="min-h-screen bg-stone-100 flex items-center justify-center p-4 font-serif text-stone-800">
          <div className="max-w-2xl w-full bg-white rounded-2xl shadow-lg overflow-hidden border border-stone-200">
            
            {/* Header & Progress */}
            <div className="bg-stone-50 px-6 py-4 border-b border-stone-200 flex justify-between items-center">
              <span className="text-sm font-bold text-emerald-700 bg-emerald-100 px-3 py-1 rounded-full">
                {currentQuestion.category}
              </span>
              <span className="text-stone-500 font-medium">
                第 {currentQuestionIndex + 1} 問 / 30
              </span>
            </div>
            <div className="h-1.5 w-full bg-stone-200">
              <div 
                className="h-full bg-emerald-600 transition-all duration-300 ease-out"
                style={{ width: `${progressPercentage}%` }}
              ></div>
            </div>

            {/* Question Area */}
            <div className="p-6 sm:p-8">
              <h3 className="text-xl sm:text-2xl leading-relaxed font-medium text-stone-800 mb-8">
                {currentQuestion.question}
              </h3>

              {/* Options */}
              <div className="space-y-3">
                {currentQuestion.options.map((option, index) => {
                  let buttonStyle = "bg-white border-2 border-stone-200 hover:border-emerald-500 hover:bg-emerald-50 text-stone-700";
                  
                  if (isAnswered) {
                    if (index === currentQuestion.correctIndex) {
                      buttonStyle = "bg-emerald-100 border-2 border-emerald-500 text-emerald-800 font-bold";
                    } else if (index === selectedOption) {
                      buttonStyle = "bg-red-50 border-2 border-red-300 text-red-700 opacity-80";
                    } else {
                      buttonStyle = "bg-white border-2 border-stone-100 text-stone-400 opacity-50";
                    }
                  }

                  return (
                    <button
                      key={index}
                      onClick={() => handleOptionClick(index)}
                      disabled={isAnswered}
                      className={`w-full text-left p-4 rounded-xl transition-all duration-200 flex items-center justify-between ${buttonStyle}`}
                    >
                      <span className="text-lg">{option}</span>
                      {isAnswered && index === currentQuestion.correctIndex && <CheckCircle className="w-6 h-6 text-emerald-600" />}
                      {isAnswered && index === selectedOption && index !== currentQuestion.correctIndex && <XCircle className="w-6 h-6 text-red-500" />}
                    </button>
                  );
                })}
              </div>

              {/* Explanation Area */}
              {isAnswered && (
                <div className="mt-8 animate-fade-in">
                  <div className={`p-4 rounded-t-xl flex items-center gap-2 font-bold text-lg ${
                    selectedOption === currentQuestion.correctIndex ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'
                  }`}>
                    {selectedOption === currentQuestion.correctIndex ? (
                      <><CheckCircle className="w-6 h-6" /> 正解！</>
                    ) : (
                      <><XCircle className="w-6 h-6" /> 不正解...</>
                    )}
                  </div>
                  <div className="bg-stone-50 border border-t-0 border-stone-200 p-5 rounded-b-xl">
                    <p className="text-stone-700 leading-relaxed mb-6">
                      <span className="font-bold text-stone-900 block mb-2">【解説】</span>
                      {currentQuestion.explanation}
                    </p>
                    <button
                      onClick={handleNext}
                      className="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"
                    >
                      {currentQuestionIndex < questions.length - 1 ? "次の問題へ" : "結果を見る"} <ChevronRight className="w-5 h-5" />
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
